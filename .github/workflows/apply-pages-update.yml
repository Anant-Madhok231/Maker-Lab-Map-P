name: Deploy website

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Apply pending website package
        shell: bash
        run: |
          if [ -f project-update-4.b64 ]; then
            mkdir -p /tmp/maker-lab-map-p-update
            base64 -d project-update-4.b64 > /tmp/maker-lab-map-p-update/update.tar.gz
            tar -xzf /tmp/maker-lab-map-p-update/update.tar.gz -C .
            git rm -f project-update-3.b64 project-update-4.b64 2>/dev/null || true
            git add -A
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            if ! git diff --cached --quiet; then
              git commit -m "Apply Brooklyn maker lab website update"
              git push origin HEAD:main
            fi
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Check code quality
        working-directory: frontend
        run: npm run lint

      - name: Build static website
        working-directory: frontend
        env:
          GITHUB_PAGES: "true"
          NEXT_PUBLIC_STATIC_EXPORT: "true"
        run: npm run build

      - name: Preserve Next.js asset folders
        run: touch frontend/out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
