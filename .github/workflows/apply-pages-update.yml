name: Deploy website

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Apply pending website package
        run: |
          if [ -f project-update-4.b64 ]; then
            base64 -d project-update-4.b64 > pages-update.tar.gz
            tar -xzf pages-update.tar.gz
            rm pages-update.tar.gz
            find . -name '._*' -delete
            git rm -f project-update-3.b64 project-update-4.b64 2>/dev/null || true
            git add README.md frontend project-update-3.b64 project-update-4.b64
            if git diff --cached --quiet; then
              echo "No packaged source changes to commit."
            else
              git config user.name "Anant-Madhok231"
              git config user.email "Anant-Madhok231@users.noreply.github.com"
              git commit -m "Update website for Brooklyn maker labs"
              git push
            fi
          else
            echo "No pending website package found."
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Check code quality
        working-directory: frontend
        run: npm run lint

      - name: Build static website
        working-directory: frontend
        env:
          GITHUB_PAGES: "true"
          NEXT_PUBLIC_STATIC_EXPORT: "true"
        run: npm run build

      - name: Preserve Next.js asset folders
        run: touch frontend/out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
